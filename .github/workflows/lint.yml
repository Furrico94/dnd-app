name: Lint HTML, CSS, and JS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies for linters
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard eslint

      - name: Lint HTML
        run: htmlhint index.html

      - name: Lint CSS
        run: stylelint "style.css"

      - name: Lint JavaScript
        run: eslint script.js

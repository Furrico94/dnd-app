<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>D&D PG Manager</title>

<style>

body{
font-family:Arial;
background:#1e1e1e;
color:white;
margin:0;
padding:20px;
}

button{
padding:10px 15px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.card{
background:#2b2b2b;
padding:15px;
margin-top:15px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#3a3a3a;
transform:scale(1.02);
}

.bar{
height:20px;
background:#444;
border-radius:6px;
overflow:hidden;
margin-top:5px;
}

.fill{
height:100%;
}

.hp{background:green;}
.xp{background:gold;}

input{
padding:5px;
margin:3px;
}

.statgrid{
display:grid;
grid-template-columns: 120px 60px 60px 90px;
gap:8px;
align-items:center;
}

.statgrid input{
width:35px;
}

.statbtn{
display:flex;
gap:5px;
}

.statbtn button{
width:28px;
height:28px;
font-size:16px;
padding:0;
cursor:pointer;
}

.pgLayout{
display:grid;
grid-template-columns: 1fr 350px;
gap:30px;
}

.sessionBox{
background:#2b2b2b;
padding:15px;
border-radius:8px;
height:fit-content;
}

.sessionPanel{
position:fixed;
right:20px;
top:120px;
width:300px;
background:#2b2b2b;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

let party = [];

try{
party = JSON.parse(localStorage.getItem("party")) || [];
}catch(e){
party = [];
}

const XP_LEVELS = [
0,
1000,
3000,
6000,
10000,
15000,
21000,
28000,
36000,
45000,
55000,
66000,
78000,
91000,
105000,
120000,
136000,
153000,
171000,
190000
];

function salva(){
localStorage.setItem("party", JSON.stringify(party));
}

function menuPG(){

let html = "<h2>Personaggi</h2>";
html += '<button onclick="nuovoPG()">➕ Aggiungi PG</button>';

for(let i=0;i<party.length;i++){

let pg = party[i];
if(!pg.classi) pg.classi = [];
let classi = "";
let livelloTot = 0;

for(let j=0;j<pg.classi.length;j++){
classi += pg.classi[j].nome+" "+pg.classi[j].livello+" ";
livelloTot += pg.classi[j].livello;
}

let hpPerc = (pg.pf / pg.pfmax) * 100;
let livello = livelloDaXP(pg.xp);
let xpBase = XP_LEVELS[livello-1];
let xpNext = XP_LEVELS[livello] || xpBase;

let xpPerc = ((pg.xp - xpBase) / (xpNext - xpBase)) * 100;

html += `
<div class="card" onclick="apriPG(${i})">

<b>${pg.nome}</b><br>
${classi}(Lv ${livelloTot})

<br><br>

${pg.pf}/${pg.pfmax}

<div class="bar">
<div class="fill hp" style="width:${hpPerc}%"></div>
</div>

XP ${pg.xp} / ${xpNext}

<div class="bar">
<div class="fill xp" style="width:${xpPerc}%"></div>
</div>

</div>
`;

}

document.getElementById("app").innerHTML = html;

}

function nuovoPG(){

let html = `
<h2>Nuovo Personaggio</h2>

Nome<br>
<input id="nome"><br><br>

<h3>Classi</h3>

<div id="classi">
<div>
<input placeholder="Classe" class="classe">
<input type="number" placeholder="Livello" class="livello">
</div>
</div>

<button onclick="aggiungiClasse()">+ Classe</button>

<h3>Caratteristiche</h3>

<div class="statgrid">

<b>Car</b><b>Val</b><b>Mod</b>

<div>Forza</div>
<div><input type="number" oninput="calcMod(this)"></div>
<div>0</div>

<div>Destrezza</div>
<div><input type="number" oninput="calcMod(this)"></div>
<div>0</div>

<div>Costituzione</div>
<div><input type="number" oninput="calcMod(this)"></div>
<div>0</div>

<div>Intelligenza</div>
<div><input type="number" oninput="calcMod(this)"></div>
<div>0</div>

<div>Saggezza</div>
<div><input type="number" oninput="calcMod(this)"></div>
<div>0</div>

<div>Carisma</div>
<div><input type="number" oninput="calcMod(this)"></div>
<div>0</div>

</div>

<h3>Punti Ferita</h3>

PF Massimi<br>
<input id="pfmax" type="number"><br><br>

<h3>Esperienza</h3>

XP Totali<br>
<input id="xp" type="number" value="0"><br><br>

<button onclick="salvaPG()">💾 Salva</button>

`;

document.getElementById("app").innerHTML = html;

}

function aggiungiClasse(){

let div = document.getElementById("classi");

let nuovo = document.createElement("div");

nuovo.innerHTML = `
<input placeholder="Classe" class="classe">
<input type="number" placeholder="Livello" class="livello">
`;

div.appendChild(nuovo);

}

function calcMod(input){
    let val = parseInt(input.value) || 0;
    let mod = Math.floor((val - 10) / 2);

    // il contenitore della riga (Val)
    let valDiv = input.parentElement;

    // il mod è il div subito dopo
    let modDiv = valDiv.nextElementSibling;

    if(mod >= 0){
        modDiv.textContent = "+" + mod;
    } else {
        modDiv.textContent = mod;
    }
}

function salvaPG(){

let nome = document.getElementById("nome").value;

let classInputs = document.querySelectorAll(".classe");
let levelInputs = document.querySelectorAll(".livello");

let classi = [];

for(let i=0;i<classInputs.length;i++){

let c = classInputs[i].value;
let l = parseInt(levelInputs[i].value);

if(c && l){
classi.push({nome:c, livello:l});
}

}

let pfmax = parseInt(document.getElementById("pfmax").value) || 0;
let xp = parseInt(document.getElementById("xp").value) || 0;

let stats = [];

let statInputs = document.querySelectorAll(".statgrid input");

for(let i=0;i<statInputs.length;i++){
stats.push(parseInt(statInputs[i].value) || 0);
}

let pg = {

nome:nome,
classi:classi,
stats:stats,
statsBase:[...stats],
pfmax:pfmax,
pf:pfmax,
xpBase:xp,
xp:xp,
sessioni:[],
ultimoAumentoStat:0

};

party.push(pg);

salva();

menuPG();

}

function calcXP(xp){

let livello = 1;

for(let i=0;i<XP_LEVELS.length;i++){

if(xp >= XP_LEVELS[i]){
livello = i+1;
}

}

let base = XP_LEVELS[livello-1];
let next = XP_LEVELS[livello] || XP_LEVELS[livello-1];

let percentuale = ((xp-base)/(next-base))*100;

return percentuale;

}

function livelloDaXP(xp){

let livello = 1;

for(let i=0;i<XP_LEVELS.length;i++){

if(xp >= XP_LEVELS[i]){
livello = i+1;
}

}

return livello;

}

function aumentoCaratteristica(livello, pg){

if(livello % 4 === 0 && pg.ultimoAumentoStat !== livello){

return "<span style='color:gold;margin-left:10px;'>⬆ Aumento caratteristica disponibile</span>";

}

return "";

}

function apriPG(index){

statBonusUsato = -1;

document.body.dataset.pgIndex = index;

let pg = party[index];

let livello = livelloDaXP(pg.xp);

let xpBase = XP_LEVELS[livello-1];
let xpNext = XP_LEVELS[livello] || xpBase;

let xpPerc = ((pg.xp-xpBase)/(xpNext-xpBase))*100;

let aumentoDisponibile =
(livello % 4 === 0) &&
(pg.ultimoAumentoStat !== livello);

let classiHTML = "";

let livelloTot = 0;

for(let i=0;i<pg.classi.length;i++){

livelloTot += pg.classi[i].livello;

classiHTML += `

<div>
<span>${pg.classi[i].nome}</span>
<span>${"Lv"}</span>
<span>${pg.classi[i].livello}</span>
</div>
`;

}


let html = `

<h2>${pg.nome}</h2>
<div>Livello totale <span id="livelloTotale">${livelloTot}</span></div>


<h3>Classi</h3>

<div id="classi">
${classiHTML}
</div>

<h3>
Caratteristiche 
<span id="statUp">${aumentoCaratteristica(livelloTot, pg)}</span>
</h3>

<div class="statgrid">

<b>Car</b><b>Val</b><b>Mod</b><b></b>

<div>Forza</div>

<div><input type="number" value="${pg.stats[0]}" data-base="${pg.stats[0]}" oninput="gestioneStat(this,0)"></div>
<div>${((Math.floor((pg.stats[0]-10)/2)>=0?"+":"") + Math.floor((pg.stats[0]-10)/2))}</div>

<div class="statbtn">
${aumentoDisponibile ? `
<button onclick="modStat(0, -1)">➖</button>
<button onclick="modStat(0, +1)">➕</button>
` : ``}
</div>

<div>Destrezza</div>
<div><input type="number" value="${pg.stats[1]}" data-base="${pg.stats[1]}" oninput="gestioneStat(this,1)"></div>
<div>${((Math.floor((pg.stats[1]-10)/2)>=0?"+":"") + Math.floor((pg.stats[1]-10)/2))}</div>

<div class="statbtn">
${aumentoDisponibile ? `
<button onclick="modStat(1, -1)">➖</button>
<button onclick="modStat(1, +1)">➕</button>
` : ``}
</div>

<div>Costituzione</div>
<div><input type="number" value="${pg.stats[2]}" data-base="${pg.stats[2]}" oninput="gestioneStat(this,2)"></div>
<div>${((Math.floor((pg.stats[2]-10)/2)>=0?"+":"") + Math.floor((pg.stats[2]-10)/2))}</div>

<div class="statbtn">
${aumentoDisponibile ? `
<button onclick="modStat(2, -1)">➖</button>
<button onclick="modStat(2, +1)">➕</button>
` : ``}
</div>

<div>Intelligenza</div>
<div><input type="number" value="${pg.stats[3]}" data-base="${pg.stats[3]}" oninput="gestioneStat(this,3)"></div>
<div>${((Math.floor((pg.stats[3]-10)/2)>=0?"+":"") + Math.floor((pg.stats[3]-10)/2))}</div>

<div class="statbtn">
${aumentoDisponibile ? `
<button onclick="modStat(3, -1)">➖</button>
<button onclick="modStat(3, +1)">➕</button>
` : ``}
</div>

<div>Saggezza</div>
<div><input type="number" value="${pg.stats[4]}" data-base="${pg.stats[4]}" oninput="gestioneStat(this,4)"></div>
<div>${((Math.floor((pg.stats[4]-10)/2)>=0?"+":"") + Math.floor((pg.stats[4]-10)/2))}</div>

<div class="statbtn">
${aumentoDisponibile ? `
<button onclick="modStat(4, -1)">➖</button>
<button onclick="modStat(4, +1)">➕</button>
` : ``}
</div>

<div>Carisma</div>
<div><input type="number" value="${pg.stats[5]}" data-base="${pg.stats[5]}" oninput="gestioneStat(this,5)"></div>
<div>${((Math.floor((pg.stats[5]-10)/2)>=0?"+":"") + Math.floor((pg.stats[5]-10)/2))}</div>

<div class="statbtn">
${aumentoDisponibile ? `
<button onclick="modStat(5, -1)">➖</button>
<button onclick="modStat(5, +1)">➕</button>
` : ``}
</div>

</div>

<h3>Punti Ferita</h3>

PF Massimi<br>
<input id="pfmax" type="number" value="${pg.pfmax}" disabled><br><br>

<button id="salvaBtn" onclick="modificaPG(${index})">💾 Salva modifiche</button>
<span id="statMsg" style="margin-left:10px;color:orange;font-weight:bold;"></span>

<div class="sessionPanel">

<h3>Esperienza</h3>

<div id="xpText"></div>

<div class="bar">
<div class="fill xp" id="xpBar"></div>
</div>

<br>

<h3>Sessioni XP</h3>

<table id="tabellaXP" border="1" style="margin-top:10px;border-collapse:collapse;width:100%;">
<tr>
<th>Sessione</th>
<th>PX</th>
<th>Totale</th>
</tr>
</table>

<button onclick="nuovaSessione(${index})">➕ Nuova sessione</button>

</div>

<br><br>
`;

document.getElementById("app").innerHTML = html;

document.querySelectorAll(".statgrid input").forEach(input => {
    if(input.value){
        calcMod(input);
    }
});

if (pg.inLevelUp){
document.getElementById("pfmax").disabled = false;
}

document.getElementById("xpText").innerText =
pg.xp + " / " + xpNext;

document.getElementById("xpBar").style.width =
xpPerc + "%";

aumentoDisponibile =
(livello % 4 === 0) &&
(pg.ultimoAumentoStat !== livello);

let btn = document.getElementById("salvaBtn");
let msg = document.getElementById("statMsg");

if(aumentoDisponibile){

btn.disabled = true;
msg.innerText = "⬆ Distribuisci il punto caratteristica";

}else{

btn.disabled = false;
msg.innerText = "";

}

let tabella = document.getElementById("tabellaXP");

if(pg.sessioni){

let totale = pg.xpBase;

for(let i=0;i<pg.sessioni.length;i++){

totale += pg.sessioni[i];

let riga = tabella.insertRow();

let c1 = riga.insertCell(0);
let c2 = riga.insertCell(1);
let c3 = riga.insertCell(2);

c1.innerText = i+1;
c2.innerText = pg.sessioni[i];
c3.innerText = totale;

}

}

}

function modificaPG(index){

let pg = party[index];

let livelloPrima = livelloDaXP(pg.xp);

let stats = [];

let statInputs = document.querySelectorAll(".statgrid input");

for(let i=0;i<statInputs.length;i++){
stats.push(parseInt(statInputs[i].value) || 0);
}

pg.stats = stats;

let nuovoPF = parseInt(document.getElementById("pfmax").value) || 0;

if(pg.inLevelUp){
    if(nuovoPF >= pg.pfmax){
        pg.pfmax = nuovoPF;
        pg.pf = nuovoPF;
        pg.inLevelUp = false;
    }else{
        alert("Puoi solo aumentare i PF al level up!");
        return;
    }
}
pg.xp = pg.xp;

let livelloDopo = livelloDaXP(pg.xp);

if(livelloDopo > livelloPrima){

pannelloLevelUp(index, livelloDopo);
return;

}

if(statBonusUsato !== -1){

pg.ultimoAumentoStat = livelloDaXP(pg.xp);

}

party[index].inLevelUp = true;

salva();

menuPG();

}

function nuovaSessione(index){

let pg = party[index];

if(!pg.sessioni){
pg.sessioni = [];
}

let xp = prompt("XP ricevuti nella sessione:");

xp = parseInt(xp);

if(!xp) return;

pg.sessioni.push(xp);

let livelloPrima = livelloDaXP(pg.xp);

let totaleSessioni = 0;

for(let i=0;i<pg.sessioni.length;i++){
totaleSessioni += pg.sessioni[i];
}

pg.xp = pg.xpBase + totaleSessioni;

let livelloDopo = livelloDaXP(pg.xp);

if(livelloDopo > livelloPrima){

pannelloLevelUp(index, livelloDopo);
salva();
return;

}

salva();

apriPG(index);

}

let statBonusUsato = -1;

function gestioneStat(input,index){

    let pgIndex = document.body.dataset.pgIndex;
    let pg = party[pgIndex];

    let livello = livelloDaXP(pg.xp);

    let base = pg.statsBase[index];
    let attuale = pg.stats[index];
    let val = parseInt(input.value);

    let aumentoDisponibile = (livello % 4 === 0) && (pg.ultimoAumentoStat !== livello);

    // ❌ se NON puoi aumentare → blocco totale
    if(!aumentoDisponibile){
        input.value = base;
        return;
    }

    // ❌ NON puoi scendere sotto il base
    if(val < base){
        input.value = base;
        return;
    }

    // ❌ NON puoi salire oltre +1
    if(val > base + 1){
        input.value = base + 1;
        val = base + 1;
    }

    // 🔁 reset (se torni al base)
    if(val === base){
        statBonusUsato = -1;
        pg.stats[index] = base;

        document.getElementById("salvaBtn").disabled = true;
        document.getElementById("statMsg").innerText = "⬆ Distribuisci il punto caratteristica";
        return;
    }

    // ✅ aumento corretto
    if(val === base + 1){

        if(statBonusUsato !== -1 && statBonusUsato !== index){
            input.value = attuale;
            return;
        }

        statBonusUsato = index;
        pg.stats[index] = val;

        document.getElementById("salvaBtn").disabled = false;
        document.getElementById("statMsg").innerText = "";
    }
}

function pannelloLevelUp(index, livello){

let pg = party[index];

let html = `
<h2>🎉 Level Up!</h2>

Il personaggio è salito al livello ${livello}

<br><br>

<button onclick="scegliClasseEsistente(${index})">
+ livello in classe esistente
</button>

<br><br>

<button onclick="nuovaClasse(${index})">
+ nuova classe
</button>

`;

document.getElementById("app").innerHTML = html;

}

function scegliClasseEsistente(index){

let pg = party[index];

let html = `
<h2>Scegli la classe da aumentare</h2>
`;

for(let i=0;i<pg.classi.length;i++){

html += `
<button onclick="aumentaClasse(${index},${i})">
${pg.classi[i].nome} (Liv ${pg.classi[i].livello})
</button>
<br><br>
`;

}

document.getElementById("app").innerHTML = html;

}

function aumentaClasse(index,classeIndex){

party[index].classi[classeIndex].livello += 1;

salva();

apriPG(index);

}

function nuovaClasse(index){

let html = `
<h2>Nuova Classe</h2>

Nome classe<br>
<input id="nuovaClasseNome">

<br><br>

<button onclick="confermaNuovaClasse(${index})">
Aggiungi classe
</button>

`;

document.getElementById("app").innerHTML = html;

}

function confermaNuovaClasse(index){

let nome = document.getElementById("nuovaClasseNome").value;

if(!nome) return;

party[index].classi.push({
nome:nome,
livello:1
});

salva();

menuPG();

}

function modStat(statIndex, delta){

let index = document.body.dataset.pgIndex;
let inputs = document.querySelectorAll(".statgrid input");

let input = inputs[statIndex];

let base = parseInt(input.dataset.base);
let attuale = parseInt(input.value);

// blocco sotto il valore base
if(attuale + delta < base) return;

// limite: solo +1 totale
let bonusUsato = 0;

inputs.forEach(inp => {
    bonusUsato += (parseInt(inp.value) - parseInt(inp.dataset.base));
});

// se provo ad aumentare oltre 1 totale → blocca
if(delta > 0 && bonusUsato >= 1) return;

// aggiorna valore
input.value = attuale + delta;

// aggiorna mod
calcMod(input);

// aggiorna stato bottone salva
aggiornaBottoneSalva();

}

function aggiornaBottoneSalva(){

let inputs = document.querySelectorAll(".statgrid input");

let bonusUsato = 0;

inputs.forEach(inp => {
    bonusUsato += (parseInt(inp.value) - parseInt(inp.dataset.base));
});

let btn = document.getElementById("salvaBtn");
let msg = document.getElementById("statMsg");

if(bonusUsato === 0){
    btn.disabled = true;
    msg.innerText = "⬆ Distribuisci il punto caratteristica";
}else{
    btn.disabled = false;
    msg.innerText = "";
}

}

menuPG();

</script>

</body>
</html>
